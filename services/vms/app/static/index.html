<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMS — Video Management</title>
  <link rel="stylesheet" href="style.css?v=135" />
  <link rel="stylesheet" href="identities.css?v=135" />
  <link rel="stylesheet" href="people.css?v=135" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">VMS</span>
      <span class="subtitle">Video Management</span>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="live">Live</button>
      <button class="tab" data-view="cameras">Cameras</button>
      <button class="tab" data-view="events">Events</button>
      <button class="tab" data-view="identities">Identities</button>
      <button class="tab" data-view="faces">Face Groups</button>
      <button class="tab" data-view="people">People</button>
    </nav>
    <div class="status">
      <span id="health-dot" class="dot dot-unknown" title="backend status"></span>
      <span id="health-text" class="health-text">checking…</span>
      <span id="gpu-text" class="gpu-text"></span>
      <span id="user-text" class="user-text"></span>
    </div>
  </header>

  <main id="main">
    <!-- ===================== LIVE ===================== -->
    <section id="view-live" class="view active">
      <div class="view-head">
        <h2>Live Monitoring</h2>
        <div class="view-actions">
          <button id="live-refresh" class="btn">Refresh</button>
        </div>
      </div>
      <div id="live-grid" class="live-grid">
        <div class="empty">Loading cameras…</div>
      </div>
    </section>

    <!-- ===================== CAMERAS ===================== -->
    <section id="view-cameras" class="view">
      <div class="view-head">
        <h2>Cameras</h2>
        <div class="view-actions">
          <button id="camera-add" class="btn btn-primary">+ Add camera</button>
          <button id="cameras-refresh" class="btn">Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>RTSP URL</th>
              <th>Enabled</th>
              <th>Status</th>
              <th>Last seen</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="cameras-body">
            <tr><td colspan="7" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===================== EVENTS ===================== -->
    <section id="view-events" class="view">
      <div class="view-head">
        <h2>Events History</h2>
        <div class="view-actions">
          <button id="events-clear" class="btn btn-danger">Clear all</button>
          <button id="events-refresh" class="btn">Refresh</button>
        </div>
      </div>
      <form id="events-filter" class="filter-bar">
        <label>Camera
          <select id="filter-camera"><option value="">All</option></select>
        </label>
        <label>Person
          <select id="filter-person"><option value="">All</option></select>
        </label>
        <label>From
          <input type="datetime-local" id="filter-from" />
        </label>
        <label>To
          <input type="datetime-local" id="filter-to" />
        </label>
        <label>Label
          <input type="text" id="filter-label" placeholder="person" />
        </label>
        <button type="submit" class="btn btn-primary">Apply</button>
        <button type="button" id="filter-clear" class="btn">Clear</button>
      </form>
      <div class="events-meta"><span id="events-total"></span></div>
      <div id="events-list" class="events-list">
        <div class="empty">Loading…</div>
      </div>
      <div class="pager">
        <button id="events-prev" class="btn" disabled>&laquo; Prev</button>
        <span id="events-page" class="page-info"></span>
        <button id="events-next" class="btn" disabled>Next &raquo;</button>
      </div>
    </section>

    <!-- ===================== IDENTITIES ===================== -->
    <section id="view-identities" class="view">
      <div class="view-head">
        <h2>Identities <span class="subtle">(auto-discovered)</span></h2>
        <div class="view-actions">
          <button id="identities-merge" class="btn" disabled>Merge selected</button>
          <button id="identities-delete" class="btn btn-danger" disabled>Delete selected</button>
          <button id="identities-clear" class="btn btn-danger">Clear all</button>
          <button id="identities-refresh" class="btn">Refresh</button>
        </div>
      </div>
      <div id="identities-grid" class="identities-grid">
        <div class="empty">Loading…</div>
      </div>
    </section>

    <!-- ===================== FACE GROUPS ===================== -->
    <section id="view-faces" class="view">
      <div class="view-head">
        <h2>Face Groups <span class="subtle">(similar faces, auto-grouped)</span></h2>
        <div class="view-actions">
          <button id="faces-clear" class="btn btn-danger">Clear all</button>
          <button id="faces-refresh" class="btn">Refresh</button>
        </div>
      </div>
      <div class="faces-controls">
        <label>Similarity
          <input type="range" id="faces-threshold" min="0.30" max="0.75" step="0.01" value="0.50" />
          <span id="faces-threshold-val">0.50</span></label>
        <label>+ Clothing
          <input type="range" id="faces-clothing" min="0" max="0.8" step="0.05" value="0" />
          <span id="faces-clothing-val">0.00</span></label>
        <label>Min group
          <input type="number" id="faces-minsize" min="1" max="50" value="1" style="width:64px" /></label>
        <span id="faces-stats" class="subtle"></span>
      </div>
      <div id="faces-grid" class="faces-grid">
        <div class="empty">Loading…</div>
      </div>
    </section>

    <!-- ===================== PEOPLE ===================== -->
    <section id="view-people" class="view">
      <div class="view-head">
        <h2>People / Known Faces</h2>
        <div class="view-actions">
          <button id="person-add" class="btn btn-primary">+ Add person</button>
          <button id="people-clear" class="btn btn-danger">Clear all</button>
          <button id="people-refresh" class="btn">Refresh</button>
        </div>
      </div>
      <div id="people-list" class="people-list">
        <div class="empty">Loading…</div>
      </div>
    </section>
  </main>

  <!-- ===================== MODAL ===================== -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modal-title">Title</h3>
        <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="hls.min.js"></script>
  <script src="app.js?v=135"></script>
  <script src="identities.js?v=135"></script>
  <script src="faces.js?v=135"></script>
  <script src="people.js?v=135"></script>
</body>
</html>
