services:
  vms:
    build: .
    image: vms:latest
    container_name: vms
    restart: unless-stopped
    ports:
      # Loopback only — reached via the nginx SSO gateway (vms.1c-rus.ru),
      # never exposed on the public IP directly.
      - "127.0.0.1:8120:8120"
    env_file:
      - .env
    # Run as the unprivileged host uid (deploy=1000) instead of root, so an
    # in-container write/RCE primitive can't tamper with host-owned files or
    # escalate. The GPU still works — /dev/nvidia* are world-accessible.
    user: "1000:1000"
    # Defense-in-depth: this workload needs no Linux capabilities, and no child
    # should ever gain privileges (blocks setuid escalation).
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    volumes:
      # Single source of truth for metadata + media: vms.db (WAL), recordings,
      # thumbnails, enrollment photos, and the rolling ffmpeg segment buffer.
      - ./data:/app/data
      # YOLOv8n.onnx + insightface buffalo_l pack. Persisted across rebuilds so
      # models are downloaded once (scripts/download_models.py).
      - ./models:/app/models
      # App code mounted read-only: the container never writes its own source.
      - ./app:/app/app:ro
    # OpenCV/ffmpeg + multiprocessing frame slots use POSIX shared memory.
    shm_size: "512m"
    # Hard RAM cap so the VMS can NEVER push the shared host into a global OOM
    # that would kill the 1C VM. If VMS exceeds this, a cgroup-scoped OOM kills a
    # camera worker (it restarts) — the 1C VM stays up. oom_score_adj makes VMS
    # the preferred victim if any host-wide pressure ever occurs (1C is -1000).
    mem_limit: 6g
    memswap_limit: 6g
    oom_score_adj: 800
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8120/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
